<!--
  OG Image Template for Is My AI Alive?

  To create og-image.png:
  1. Open this file in a browser or design tool
  2. Export as PNG at 1200x630 pixels
  3. Save as og-image.png in the same directory
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a4e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Main text -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">Is My AI Alive?</text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a0a0c0" text-anchor="middle">Get a second perspective on your AI conversations</text>

  <!-- Question mark icon -->
  <circle cx="600" cy="480" r="60" fill="none" stroke="#4a9eff" stroke-width="4"/>
  <text x="600" y="502" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="#4a9eff" text-anchor="middle">?</text>

  <!-- URL -->
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#606080" text-anchor="middle">ismyaialive.com</text>
</svg>
